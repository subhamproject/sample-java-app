apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/subhamproject/sample-java-app.git
    targetRevision: master
    path: chart
    helm:
      parameters:
      - name: image.tag
        value: "latest"
      - name: ingress.hostname
        value: "frontend.dsp.codes"
      - name: replicaCount
        value: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
