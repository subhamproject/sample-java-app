# .github/workflows/preview-url.yml
name: Post Preview URL

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - labeled

jobs:
  comment:
    if: |
      github.event.label.name == 'preview' ||      #Choose either of the lables in PR to trigger this
      github.event.label.name == 'deploy-preview'  #Choose either of the lables in PR to trigger this

    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Wait for ArgoCD deployment
        run: sleep 60

      - name: Comment PR with Preview URL
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            // PR details
            const prNumber = pr.number;
            const prBranchRaw = pr.head.ref;
            const prBranch = prBranchRaw.replaceAll('/', '-'); // safe for URLs

            // repo details
            const repo = context.repo.repo;

            // build preview URL
            const previewUrl = `https://preview.${repo}-${prBranch}-pr-${prNumber}.dsp.codes`;

            // ArgoCD app URL (optional)
            const argoUrl = `https://argocd.dsp.codes/applications/preview.${repo}-${prBranch}-pr-${prNumber}.dsp.codes`;

            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: repo,
              body: `🚀 **Preview Environment Ready**

             🔗 Preview URL: ${previewUrl}

             📦 ArgoCD App: ${argoUrl}

             🧾 PR: #${prNumber}
             🌿 Branch: \`${prBranchRaw}\``
              });
