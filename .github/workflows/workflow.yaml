name: Custom Github SelfHosted Runner Maven Build 
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: "${{ github.event.repository.name }}"
jobs:
  activate-github-runner:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      gitrunner_vm_id: ${{ steps.runner-label.outputs.vm_id }}
      task_arn: ${{ steps.create-task.outputs.task_arn }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE }}
          aws-region: ap-south-2

      - name: Generate Runner Label
        id: runner-label
        run: |
          VM_ID=$(uuidgen)
          echo "vm_id=$VM_ID" >> $GITHUB_OUTPUT

      - name: Discover Networking
        id: network
        run: |
          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:kubernetes.io/role/internal-elb,Values=1" \
            --query 'Subnets[].SubnetId' \
            --output text | tr '\t' ',')

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=shared-github-runner-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT

          echo "Subnets: $SUBNETS"
          echo "Security Group: $SG_ID"
     
      - name: Launch Fargate Spot Runner
        id: create-task
        run: |
          TASK_OUTPUT=$(aws ecs run-task --cluster shared_git_runner_cluster \
           --capacity-provider-strategy capacityProvider=FARGATE_SPOT,weight=1 \
           --task-definition runner \
           --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnets }}],securityGroups=[${{ steps.network.outputs.sg_id }}],assignPublicIp=DISABLED}" \
           --overrides '{"containerOverrides":[{"name":"runner","environment":[{"name":"GITHUB_REPO","value":"${{ github.repository }}"},{"name":"RUNNER_LABELS","value":"${{ steps.runner-label.outputs.vm_id }}"}]}]}')
          TASK_ARN=$(echo $TASK_OUTPUT | jq -r '.tasks[0].taskArn')
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
  build-code:
    needs: activate-github-runner
    runs-on:
      - self-hosted
      - ${{ needs.activate-github-runner.outputs.gitrunner_vm_id }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Verify Runner
        run: |
          echo "Running on self-hosted runner"
          hostname
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build with Maven
        run: mvn clean install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE }}
          aws-region: ap-south-2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --image-scanning-configuration scanOnPush=true

      - name: Get ECR Repository URI
        id: ecr
        run: |
          REPOSITORY_URI=$(aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --query 'repositories[0].repositoryUri' \
            --output text)

          echo "repository_uri=$REPOSITORY_URI" >> $GITHUB_OUTPUT

          echo "Using repository: $REPOSITORY_URI"

      - name: Build and Push Image with Kaniko
        run: |
          export DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
          sudo -E /kaniko/executor \
            --context "${GITHUB_WORKSPACE}" \
            --dockerfile "${GITHUB_WORKSPACE}/docker/Dockerfile" \
            --destination "${{ steps.ecr.outputs.repository_uri }}:${{ github.sha }}" \
            --destination "${{ steps.ecr.outputs.repository_uri }}:latest" \
            --cache=true \
            --cache-copy-layers \
            --snapshot-mode=redo \
            --verbosity=info \
            --ignore-path=/bin \
            --ignore-path=/sbin \
            --ignore-path=/lib \
            --ignore-path=/lib64 \
            --ignore-path=/usr/bin \
            --ignore-path=/usr/sbin \
            --ignore-path=/usr/lib \
            --ignore-path=/usr/lib64
  deactivate-github-runner:
    needs: [activate-github-runner, build-code]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: always() 
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE }}
          aws-region: ap-south-2

      - name: Stop ECS Runner Task
        run: |
          aws ecs stop-task \
            --cluster shared_git_runner_cluster \
            --task "${{ needs.activate-github-runner.outputs.task_arn }}" \
            --reason "GitHub Action workflow execution complete"
